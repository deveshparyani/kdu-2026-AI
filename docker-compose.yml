version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fastapi_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fastapi_template
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fastapi_template_test
      SECRET_KEY: development-secret-key
      AUTH_JWT_SECRET: development-jwt-secret-key
      APP_DEBUG: "true"
      APP_ENV: development
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
