        handler: faq_handler
        model: cheap
        prompt: faq.simple
      standard:
        handler: faq_handler
        model: cheap
        prompt: faq.standard

    medium:
      simple:
        handler: faq_handler
        model: standard
        prompt: faq.standard
      standard:
        handler: faq_handler
        model: standard
        prompt: faq.standard

  booking:
