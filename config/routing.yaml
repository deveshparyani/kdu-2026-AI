      simple:
        handler: booking_handler
        model: cheap
        prompt: booking.simple

    medium:
      standard:
        handler: booking_handler
        model: standard
        prompt: booking.standard

    high:
      complex:
        handler: booking_handler
        model: premium
        prompt: booking.complex

  complaint:
    low:
      standard:
        handler: complaint_handler
        model: standard
        prompt: complaint.standard

    medium:
      standard:
        handler: complaint_handler
        model: standard
        prompt: complaint.standard

    high:
      complex:
        handler: complaint_handler
        model: premium
        prompt: complaint.complex
        human_handoff: true

